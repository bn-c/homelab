---
- name: Install NFS server
  apt:
    name: nfs-kernel-server
    state: present
    update_cache: yes

- name: Create NFS export directory
  file:
    path: /srv/nfs
    state: directory
    owner: nobody
    group: nogroup
    mode: '0777'

- name: Configure NFS exports
  lineinfile:
    path: /etc/exports
    line: '/srv/nfs *(rw,sync,no_subtree_check,no_root_squash)'
    state: present
  notify: restart nfs-server
