- name: Install curl and nfs-common
  apt:
    name: 
      - curl
      - nfs-common
    state: present
    update_cache: yes

- name: Install Docker via convenience script
  shell: curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
  args:
    creates: /usr/bin/docker

- name: Install python3-docker
  apt:
    name: python3-docker
    state: present

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/qbittorrent
    - /opt/qbittorrent/downloads

- name: Mount NFS share
  mount:
    path: /opt/qbittorrent/downloads
    src: nfs-server.local:/srv/nfs/torrent
    fstype: nfs
    state: mounted

- name: Copy docker-compose
  copy:
    src: docker-compose.yml
    dest: /opt/qbittorrent/docker-compose.yml

- name: Stop and remove existing docker-compose containers
  command: docker compose -f /opt/qbittorrent/docker-compose.yml down
  args:
    chdir: /opt/qbittorrent
  register: compose_down
  failed_when: false

- name: Run docker-compose
  command: docker compose -f /opt/qbittorrent/docker-compose.yml up -d
  args:
    chdir: /opt/qbittorrent
