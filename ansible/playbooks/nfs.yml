---
- hosts: nfs
  become: yes
  tasks:
    - name: Install NFS server
      apt:
        name: nfs-kernel-server
        state: present
        update_cache: yes

    - name: Create NFS export directory for torrent downloads
      file:
        path: /srv/nfs/torrent/downloads
        state: directory
        owner: nobody
        group: nogroup
        mode: '0777'

    - name: Create NFS export directory for qbittorrent config
      file:
        path: /srv/nfs/torrent/config
        state: directory
        owner: nobody
        group: nogroup
        mode: '0777'

    - name: Configure NFS exports
      lineinfile:
        path: /etc/exports
        line: '/srv/nfs *(rw,sync,no_subtree_check,root_squash)'
        state: present
      notify: restart nfs-server

  handlers:
    - name: restart nfs-server
      service:
        name: nfs-kernel-server
        state: restarted
